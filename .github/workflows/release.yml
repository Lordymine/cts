name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          name="cts_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "cts${ext}" .
          if [ "$GOOS" = "windows" ]; then
            zip "dist/${name}.zip" "cts${ext}"
          else
            tar czf "dist/${name}.tar.gz" "cts${ext}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
