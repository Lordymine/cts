name: CI

# CI runs only on pull requests targeting main. Direct pushes to main run no CI
# (only the owner pushes there); tag pushes trigger the Release workflow.
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Format check
        run: test -z "$(gofmt -l .)" || { echo 'Files not gofmt-ed:'; gofmt -l .; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
